# Wasalt liveness — checks every active wasalt_*_listings row is still alive on wasalt.sa,
# strikes dead ones, kills after 3 strikes. Routes through the Saudi residential proxy
# so wasalt.sa serves real listing pages (cloud direct = blocked). Mirrors Aqar's liveness.

name: Wasalt liveness

on:
  # NO auto-schedule: liveness fetches each listing's full ~400KB page, and for Wasalt that goes
  # through the METERED Saudi proxy — daily over ~58k rows would be ~700 GB/month, which would blow
  # the Webshare plan. Disabled until a lightweight (status/range-limited) liveness check is wired
  # up. Manual-only for now. (cost guard — caught in adversarial review 2026-06.)
  workflow_dispatch: {}

concurrency:
  group: wasalt-liveness
  cancel-in-progress: false

jobs:
  liveness:
    name: Liveness ${{ matrix.table }} #${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        table:
          - wasalt_residential_listings
          - wasalt_commercial_listings
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Liveness sweep ${{ matrix.table }} shard ${{ matrix.shard }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
        run: |
          python -m scrapers.aqar.liveness \
            --table ${{ matrix.table }} \
            --shards 8 --shard ${{ matrix.shard }}
