# Wasalt ADDITIVE Arabic enricher (new-only) — captures the COMPLETE /ar payload into the additive
# `ar_data` column (+ city_ar/district_ar/region_id) for rows with ar_fetched=false, CAPPED per run
# so the Saudi proxy bandwidth stays tiny. This is the STANDING counterpart to the one-time local
# backfill: once that clears the existing rows, this only processes the daily trickle of NEW listings.
#
# ADDITIVE ONLY — leaves the live English `city`, `additional_info`, and `photo_urls` untouched. The
# /ar PRIMARY flip (turning the engine Arabic-native) is a SEPARATE cutover, not this job.
#
# workflow_dispatch only (the project schedules via Supabase pg_cron → workflow_dispatch). Merging this
# file does NOT auto-run anything; enable the pg_cron entry when ready.

name: Wasalt enrich AR

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max rows per table this run (bounds proxy bandwidth; default 2000)"
        required: false
        default: "2000"
      max_pending:
        description: "Circuit breaker: abort with no proxy fetches if the un-fetched backlog exceeds this many rows (default 5000)"
        required: false
        default: "5000"
      allow_backfill:
        description: "Override the circuit breaker to deliberately drain a large backlog through the proxy (true/false)"
        required: false
        default: "false"
      retry_errs:
        description: "Max previously-errored rows (ar_data._err) to re-attempt this run — oldest first, >=24h backoff per row, parked after 5 definitive failures. 0 disables (default 100)"
        required: false
        default: "100"

concurrency:
  group: wasalt-enrich-ar
  cancel-in-progress: false

jobs:
  enrich-ar:
    name: Enrich AR ${{ matrix.table }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        table:
          - wasalt_residential_listings
          - wasalt_commercial_listings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Enrich AR ${{ matrix.table }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
          SCRAPE_MIN_INTERVAL: "0.3"
          ALLOW_BACKFILL_FLAG: ${{ (github.event.inputs.allow_backfill == 'true') && '--allow-backfill' || '' }}
        run: |
          python -m scrapers.wasalt.enrich_ar \
            --table ${{ matrix.table }} \
            --limit ${{ github.event.inputs.limit || 2000 }} \
            --workers 6 \
            --max-pending ${{ github.event.inputs.max_pending || 5000 }} \
            --retry-errs ${{ github.event.inputs.retry_errs || 100 }} \
            $ALLOW_BACKFILL_FLAG
