# Wasalt residential DEEP FILL — manual bulk loader. Mirrors "Aqar residential deep fill".
# Goes deep (up to 800 pages × every slug × sale+rent). One parallel job per slice through the
# Saudi residential proxy.

name: Wasalt residential deep fill

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Max pages per (slug × deal) slice (default 800)"
        required: false
        default: "800"

jobs:
  fill:
    name: Fill ${{ matrix.slug }} ${{ matrix.deal }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        slug: [apartment, villa-townhouse, floor, building, land, rest-house, chalet, farm, room, duplex]
        deal: [sale, rent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Deep fill ${{ matrix.slug }} ${{ matrix.deal }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
          SCRAPE_MIN_INTERVAL: "0.25"
        run: |
          python -m scrapers.wasalt.run \
            --type residential \
            --slug ${{ matrix.slug }} \
            --deal ${{ matrix.deal }} \
            --pages ${{ github.event.inputs.pages || 800 }}
