# Aqar deep-fill — bulk loads ALL listings for every city in parallel.
#
# Unlike the regular sweep (3 pages, keeps fresh), this goes DEEP: up to 150 pages per
# (type × deal × city) combo. One GitHub machine per city = own IP = no shared throttle.
# 12 cities run simultaneously; each city scrapes all residential types concurrently
# (WORKERS=14). This is the "fill the database fast" job.
#
# Expected runtime: 20–40 minutes per city (run in parallel, so wall-clock = slowest city).
# Expected yield: thousands of new listings per city if they haven't been deep-scraped before.
#
# HOW TO RUN: Actions tab → "Aqar deep fill" → Run workflow.
# Choose which city to scrape (leave blank = ALL cities in parallel).

name: Aqar deep fill

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City to deep-fill (leave blank for ALL cities in parallel)"
        required: false
        default: ""
      pages:
        description: "Max pages per slice (default 150)"
        required: false
        default: "150"
      limit:
        description: "Max listings per slice (default 5000)"
        required: false
        default: "5000"

jobs:
  # Decide which cities to run. If a city was specified, run just that one.
  # Otherwise, fan out to all cities.
  setup:
    runs-on: ubuntu-latest
    outputs:
      cities: ${{ steps.pick.outputs.cities }}
    steps:
      - id: pick
        run: |
          if [ -n "${{ github.event.inputs.city }}" ]; then
            echo "cities=[\"${{ github.event.inputs.city }}\"]" >> $GITHUB_OUTPUT
          else
            # Every city in Aqar's OWN catalog (apartment + land filters), all 13 regions.
            # GitHub runs ~20 in parallel and queues the rest, so all ~95 complete in a few waves.
            echo 'cities=["riyadh","al_kharj","al_majmaah","dawadmi","al_zulfi","afif","al_quwayiyah","shaqra","diriyah","al_muzahimiyah","thadiq","hawtat_bani_tamim","al_ghat","rumah","al_dalam","al_hariq","al_sulayyil","al_hayathim","jeddah","mecca","taif","rabigh","al_qunfudhah","kaec","thuwal","al_jumum","al_kamil","al_lith","turabah","raniyah","al_khurma","medina","yanbu","al_ula","badr","al_hanakiyah","umluj","khaybar","mahd_adh_dhahab","buraidah","unaizah","al_rass","al_bukayriyah","al_mithnab","al_badai","riyadh_al_khabra","al_nabhaniyah","al_shamasiyah","dammam","khobar","dhahran","hofuf","jubail","qatif","hafar_al_batin","ras_tanura","abqaiq","al_nairyah","khafji","sayhat","safwa","tarout","al_uyun","abha","khamis_mushait","bisha","mahayel","ahad_rafidah","al_majardah","balsamar","tathlith","tabuk","duba","al_wajh","tayma","hail","baqaa","al_ghazalah","al_shanan","arar","rafha","turaif","jazan","sabya","abu_arish","samtah","baysh","ahad_al_masarihah","najran","sharurah","al_baha","sakaka","qurayyat","dawmat_al_jandal"]' >> $GITHUB_OUTPUT
          fi

  deep-fill:
    needs: setup
    name: Deep fill ${{ matrix.city }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        city: ${{ fromJson(needs.setup.outputs.cities) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Deep fill ${{ matrix.city }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_WORKERS: "14"
          SCRAPE_MIN_INTERVAL: "0.12"
        run: |
          python -m scrapers.aqar.run_residential \
            --all-residential \
            --city ${{ matrix.city }} \
            --pages ${{ github.event.inputs.pages || 150 }} \
            --limit ${{ github.event.inputs.limit || 5000 }}
