# Aqar deep-fill — bulk loads ALL listings for every city in parallel, FAST.
#
# Goes DEEP: up to 150 pages per (type × deal × city). One GitHub machine per shard = own IP.
# SHARDING: the 7 heaviest cities (Riyadh, Jeddah, …) are split into 3 type-group jobs each, so
# no single machine has to scrape all 10 of a big city's types (that used to take 2h+ and hit the
# timeout). Small towns stay one job. The slowest single shard now sets the wall-clock — minutes,
# not hours. ~108 shards total; GitHub runs ~20 at once.
#
# HOW TO RUN: Actions tab → "Aqar deep fill" → Run workflow. Blank city = ALL (sharded).

name: Aqar residential deep fill

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City to deep-fill (leave blank for ALL cities in parallel)"
        required: false
        default: ""
      pages:
        description: "Max pages per slice (default 150)"
        required: false
        default: "150"
      limit:
        description: "Max listings per slice (default 5000)"
        required: false
        default: "5000"

jobs:
  # Build the shard matrix. Heavy cities → 3 type-group shards each; everything else → 1 shard (all
  # types). If a single city was named, just that one (all types).
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: python
        run: |
          import json, os
          one = "${{ github.event.inputs.city }}".strip()
          ALL = ["riyadh","al_kharj","al_majmaah","dawadmi","al_zulfi","afif","al_quwayiyah","shaqra","diriyah","al_muzahimiyah","thadiq","hawtat_bani_tamim","al_ghat","rumah","al_dalam","al_hariq","al_sulayyil","al_hayathim","jeddah","mecca","taif","rabigh","al_qunfudhah","kaec","thuwal","al_jumum","al_kamil","al_lith","turabah","raniyah","al_khurma","medina","yanbu","al_ula","badr","al_hanakiyah","umluj","khaybar","mahd_adh_dhahab","buraidah","unaizah","al_rass","al_bukayriyah","al_mithnab","al_badai","riyadh_al_khabra","al_nabhaniyah","al_shamasiyah","dammam","khobar","dhahran","hofuf","jubail","qatif","hafar_al_batin","ras_tanura","abqaiq","al_nairyah","khafji","sayhat","safwa","tarout","anak","al_uyun","abha","khamis_mushait","bisha","mahayel","ahad_rafidah","al_majardah","balsamar","tathlith","tabuk","duba","al_wajh","tayma","hail","baqaa","al_ghazalah","al_shanan","arar","rafha","turaif","jazan","sabya","abu_arish","samtah","baysh","ahad_al_masarihah","najran","sharurah","al_baha","sakaka","qurayyat","dawmat_al_jandal"]
          # Heaviest cities — sharded by type so they finish in minutes, not hours.
          HEAVY = ["riyadh","jeddah","dammam","khobar","mecca","medina","buraidah"]
          GROUPS = ["apartment,floor", "villa,building,land", "house,room,rest_house,chalet,camp"]
          cities = [one] if one else ALL
          inc = []
          for c in cities:
              if c in HEAVY and not one:
                  for g in GROUPS:
                      inc.append({"city": c, "types": g, "label": f"{c}:{g.split(',')[0]}…"})
              else:
                  inc.append({"city": c, "types": "all", "label": c})
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps({"include": inc}) + "\n")

  deep-fill:
    needs: setup
    name: Fill ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Fill ${{ matrix.label }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_WORKERS: "16"
          SCRAPE_MIN_INTERVAL: "0.10"
        run: |
          python -m scrapers.aqar.run_residential \
            --city ${{ matrix.city }} \
            --types "${{ matrix.types }}" \
            --pages ${{ github.event.inputs.pages || 150 }} \
            --limit ${{ github.event.inputs.limit || 5000 }}
