# Aqargate sync — aqargate.com is a small Saudi Houzez WordPress site (~257 listings, public REST
# API, no auth). A single full-refresh every 4h re-scrapes everything and auto-prunes anything that
# dropped off (self-cleaning, no separate liveness/cleanup). No proxy — public WP REST.

name: Aqargate sync

on:
  schedule:
    - cron: "45 */4 * * *"   # every 4 hours (offset from the other sources)
  workflow_dispatch: {}

concurrency:
  group: aqargate-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Sync Aqargate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MIN_INTERVAL: "0.3"
        run: python -m scrapers.aqargate.run --type all
