# Small sources sync — ONE daily workflow for ALL the small, low-churn Saudi platforms (Aldarim,
# Aqar Gate, Hajer, Al Hoshan, Sanadak, …). Replaces the per-platform sync workflows.
#
# Why: these sites are small (tens–hundreds of listings) and low-churn, so they don't need the 4h
# cadence the big sources (Aqar, Wasalt) get — daily is plenty. And ONE established daily cron fires
# reliably, where many separate brand-new 4h crons get skipped by GitHub's scheduler.
#
# Add a new small platform = add ONE line to the matrix below: its name + the command that scrapes
# both its verticals in one run. That's it.

name: Small sources sync

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Single source to run (blank = all)"
        required: false
        default: ""

concurrency:
  group: small-sources-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # covers aqarcity (~2.3k detail pages behind Cloudflare) + Sanadak; rest are fast
    strategy:
      fail-fast: false    # one source failing never blocks the others
      max-parallel: 18
      matrix:
        include:
          - { source: aldarim,  cmd: "python -m scrapers.aldarim.run --pages 50" }
          - { source: aqargate, cmd: "python -m scrapers.aqargate.run --type all" }
          - { source: hajer,    cmd: "python -m scrapers.hajer.run --type all" }
          - { source: alhoshan, cmd: "python -m scrapers.alhoshan.run --type all" }
          - { source: sanadak,  cmd: "python -m scrapers.sanadak.run --type all" }
          - { source: eastabha, cmd: "python -m scrapers.eastabha.run --type all" }
          - { source: aqarcity, cmd: "python -m scrapers.aqarcity.run --type all" }
          - { source: raghdan,    cmd: "python -m scrapers.raghdan.run --type all" }
          - { source: eaqartabuk, cmd: "python -m scrapers.eaqartabuk.run --type all" }
          - { source: satel,      cmd: "python -m scrapers.satel.run --type all" }
          - { source: sadin,      cmd: "python -m scrapers.sadin.run --type all" }
          - { source: toor,        cmd: "python -m scrapers.toor.run --type all" }
          - { source: mustqr,      cmd: "python -m scrapers.mustqr.run --type all" }
          - { source: ramzalqasim, cmd: "python -m scrapers.ramzalqasim.run --type all" }
          - { source: fursaghyr,   cmd: "python -m scrapers.fursaghyr.run --type all" }
          - { source: jazwtn,      cmd: "python -m scrapers.jazwtn.run --type all" }
          - { source: mizlaj,      cmd: "python -m scrapers.mizlaj.run --type all" }
          - { source: aqaratikom,  cmd: "python -m scrapers.aqaratikom.run --type all" }
          - { source: awal,        cmd: "python -m scrapers.awal.run --type all" }
          - { source: alkhaas,     cmd: "python -m scrapers.alkhaas.run --type all" }
          - { source: abeea,       cmd: "python -m scrapers.abeea.run --type all" }
          - { source: jurash,      cmd: "python -m scrapers.jurash.run --type all" }
          - { source: alnokhba,    cmd: "python -m scrapers.alnokhba.run --type all" }
          - { source: dealapp,     cmd: "DEALAPP_MAX_FILTER_PAGES=2000 DEALAPP_WORKERS=3 python -m scrapers.dealapp.run --type all" }
          - { source: erapulse,    cmd: "python -m scrapers.erapulse.run --type all" }
          - { source: nowaisiry,   cmd: "python -m scrapers.nowaisiry.run --type all" }
          - { source: october,    cmd: "python -m scrapers.october.run --type all" }
          - { source: souq24,     cmd: "python -m scrapers.souq24.run --type all" }
          # NOTE: muktamel is NOT here. Its pages are ~1.4MB each and it has no list API / usable
          # sitemap, so a full sequential-ID scan is ~45GB over hours — impossible on a 4h cadence.
          # It runs on its OWN weekly workflow (muktamel-sync.yml), scoped to the live ID band.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Sync ${{ matrix.source }}
        # Skip non-matching sources when a single source was requested via workflow_dispatch.
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == matrix.source }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MIN_INTERVAL: "0.3"
        run: ${{ matrix.cmd }}
