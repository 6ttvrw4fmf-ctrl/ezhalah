# Wasalt commercial DEEP FILL — manual bulk loader. Mirrors "Aqar commercial fill".

name: Wasalt commercial fill

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Max pages per (slug × deal) slice (default 400 — commercial is thinner)"
        required: false
        default: "400"

jobs:
  fill:
    name: Fill ${{ matrix.slug }} ${{ matrix.deal }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        slug: [shop, office, warehouse, commercial-land, showroom, building, land]
        deal: [sale, rent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Commercial fill ${{ matrix.slug }} ${{ matrix.deal }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
          SCRAPE_MIN_INTERVAL: "0.25"
        run: |
          python -m scrapers.wasalt.run \
            --type commercial \
            --slug ${{ matrix.slug }} \
            --deal ${{ matrix.deal }} \
            --pages ${{ github.event.inputs.pages || 400 }}
