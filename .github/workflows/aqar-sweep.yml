# Aqar discovery sweep — the "grocery shopper" cron.
#
# Each city runs as its OWN parallel GitHub job on its own machine with its own IP address.
# This means 12 cities scrape simultaneously instead of one at a time — roughly 12× faster.
# Each runner does a light 3-page sweep of every (type × deal) combo for its city and upserts
# new listings. Running every 4 hours keeps the DB fresh without missing anything for long.
#
# Manual trigger: Actions tab → "Aqar sweep" → Run workflow.

name: Aqar residential sweep

on:
  workflow_dispatch: {}

# Cancel any in-flight sweep when a new one starts (sweeps are idempotent).
concurrency:
  group: aqar-sweep
  cancel-in-progress: true

jobs:
  sweep:
    name: Sweep ${{ matrix.city }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false   # one city failing doesn't kill the others
      matrix:
        city:
          - riyadh
          - jeddah
          - khobar
          - dammam
          - mecca
          - medina
          - taif
          - abha
          - tabuk
          - buraidah
          - hail
          - hofuf

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Sweep ${{ matrix.city }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_WORKERS: "10"
          SCRAPE_MIN_INTERVAL: "0.15"
        run: |
          python -m scrapers.aqar.run_residential \
            --all-residential \
            --city ${{ matrix.city }} \
            --pages 3 \
            --limit 300
