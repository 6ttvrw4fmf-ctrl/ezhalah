# Aqar discovery sweep — the "grocery shopper" cron.
#
# Each city runs as its OWN parallel GitHub job on its own machine with its own IP address.
# This means 12 cities scrape simultaneously instead of one at a time — roughly 12× faster.
# Each runner does a light 3-page sweep of every (type × deal) combo for its city and upserts
# new listings. Running every 4 hours keeps the DB fresh without missing anything for long.
#
# Manual trigger: Actions tab → "Aqar sweep" → Run workflow.

name: Aqar residential sweep

on:
  workflow_dispatch: {}

# Cancel any in-flight sweep when a new one starts (sweeps are idempotent).
concurrency:
  group: aqar-sweep
  cancel-in-progress: true

jobs:
  sweep:
    name: Sweep ${{ matrix.city }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false   # one city failing doesn't kill the others
      matrix:
        city:
          # Full 95-city catalog — matches the commercial sweep so niche regions (Al Jawf, Najran,
          # Northern Borders, Al Bahah, Jazan, …) stay fresh every 4h, not just on manual deep-fills.
          # Each city is a light 3-page sweep; the heavy big cities already dominated the wall-clock.
          - riyadh
          - al_kharj
          - al_majmaah
          - dawadmi
          - al_zulfi
          - afif
          - al_quwayiyah
          - shaqra
          - diriyah
          - al_muzahimiyah
          - thadiq
          - hawtat_bani_tamim
          - al_ghat
          - rumah
          - al_dalam
          - al_hariq
          - al_sulayyil
          - al_hayathim
          - jeddah
          - mecca
          - taif
          - rabigh
          - al_qunfudhah
          - kaec
          - thuwal
          - al_jumum
          - al_kamil
          - al_lith
          - turabah
          - raniyah
          - al_khurma
          - medina
          - yanbu
          - al_ula
          - badr
          - al_hanakiyah
          - umluj
          - khaybar
          - mahd_adh_dhahab
          - buraidah
          - unaizah
          - al_rass
          - al_bukayriyah
          - al_mithnab
          - al_badai
          - riyadh_al_khabra
          - al_nabhaniyah
          - al_shamasiyah
          - dammam
          - khobar
          - dhahran
          - hofuf
          - jubail
          - qatif
          - hafar_al_batin
          - ras_tanura
          - abqaiq
          - al_nairyah
          - khafji
          - sayhat
          - safwa
          - tarout
          - anak
          - al_uyun
          - abha
          - khamis_mushait
          - bisha
          - mahayel
          - ahad_rafidah
          - al_majardah
          - balsamar
          - tathlith
          - tabuk
          - duba
          - al_wajh
          - tayma
          - hail
          - baqaa
          - al_ghazalah
          - al_shanan
          - arar
          - rafha
          - turaif
          - jazan
          - sabya
          - abu_arish
          - samtah
          - baysh
          - ahad_al_masarihah
          - najran
          - sharurah
          - al_baha
          - sakaka
          - qurayyat
          - dawmat_al_jandal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Sweep ${{ matrix.city }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_WORKERS: "10"
          SCRAPE_MIN_INTERVAL: "0.15"
        run: |
          python -m scrapers.aqar.run_residential \
            --all-residential \
            --city ${{ matrix.city }} \
            --pages 3 \
            --limit 300
