# Aqar discovery sweep — the "grocery shopper" cron.
#
# Walks every (city × category) on Aqar.sa once every 4 hours, enriches new listings and
# upserts them into Supabase. Refreshing the rows via upsert also updates `last_seen_at`
# so the liveness sweep can tell what's still around.
#
# Cost: this job runs in ~5–15 minutes per sweep × 6 sweeps/day ≈ 30–90 GitHub minutes/day,
# well within the free tier (~2,000 min/month for private repos, unlimited for public).
#
# Manual trigger: go to the Actions tab in GitHub → "Aqar sweep" → "Run workflow".

name: Aqar sweep

on:
  schedule:
    # Every 4 hours, on the hour. cron is in UTC. KSA = UTC+3, so this fires at
    # 03:00, 07:00, 11:00, 15:00, 19:00, 23:00 KSA — spread across the day.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions UI

# Don't pile up overlapping runs if a previous sweep is still going — cancel the in-flight
# one so the new one takes over. (Sweeps are idempotent — upsert handles re-discovery.)
concurrency:
  group: aqar-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 50  # if a sweep runs longer than this, something is wrong — kill it
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run discovery sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m scrapers.aqar.sweep \
            --cities riyadh,jeddah,khobar,dammam,mecca,medina,taif \
            --pages 3 \
            --limit-per-slice 120
