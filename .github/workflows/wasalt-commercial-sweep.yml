# Wasalt commercial sweep — runs every 4h in the cloud through the Saudi residential proxy.
# Mirrors Aqar's commercial sweep. Wasalt has thinner commercial inventory; light pass is plenty.

name: Wasalt commercial sweep

on:
  workflow_dispatch: {}

concurrency:
  group: wasalt-commercial-sweep
  cancel-in-progress: true

jobs:
  sweep:
    name: Wasalt com ${{ matrix.slug }} ${{ matrix.deal }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        slug: [shop, office, warehouse, commercial-land, showroom, building, land]
        deal: [sale, rent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Sweep ${{ matrix.slug }} ${{ matrix.deal }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
          SCRAPE_MIN_INTERVAL: "0.4"
        run: |
          python -m scrapers.wasalt.run \
            --type commercial \
            --slug ${{ matrix.slug }} \
            --deal ${{ matrix.deal }} \
            --pages 3
