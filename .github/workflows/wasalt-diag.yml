# TEMPORARY read-only diagnostic (owner 2026-07-10): confirm the recurring 'empty' Wasalt categories
# return a valid searchResult with count=0 through the production DataImpulse Saudi proxy, using the
# same curl_cffi chrome124 session as the sweep. Writes NOTHING to the DB. Runs on push to the fix
# branch (so the write-only WASALT_PROXY_URL secret is available). REMOVE before merging to main.
name: Wasalt empty-category live diagnostic

on:
  push:
    branches: [fix/wasalt-empty-category]
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Probe empty categories through the Saudi proxy
        env:
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
          SCRAPE_MIN_INTERVAL: "0.4"
        run: python -m scrapers.wasalt.diag_empty_categories
