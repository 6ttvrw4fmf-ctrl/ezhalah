# Sanadak sync — sanadak.sa is a Saudi Next.js/RSC site (~1,164 listings, REGA-integrated). Enumerate
# all active listings from /sitemap.xml, fetch each via the RSC:1 flight payload (no auth, no proxy).
# A single full-refresh every 4h re-scrapes everything and auto-prunes anything that dropped off
# (the sitemap only carries published listings, so sold/rented are excluded at source).

name: Sanadak sync

on:
  schedule:
    - cron: "50 */4 * * *"   # every 4 hours (offset from the other sources)
  workflow_dispatch: {}

concurrency:
  group: sanadak-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Sync Sanadak
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MIN_INTERVAL: "0.3"
        run: python -m scrapers.sanadak.run --type all
