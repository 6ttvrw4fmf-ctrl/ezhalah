# Wasalt deep enricher (new-only) — fetches detail-page fields (Plan/Land number, Street, Ad
# source, …) for rows that don't have them yet, CAPPED per run so the Saudi proxy bandwidth stays
# tiny. After the one-time local Mac backfill marks every current row enriched, this only ever
# processes the daily trickle of NEW listings (a few hundred), so the metered Webshare plan is safe.

name: Wasalt enrich

on:
  schedule:
    - cron: "0 5 * * *"   # once daily 05:00 UTC — comfortably covers a day of new listings
  workflow_dispatch:
    inputs:
      limit:
        description: "Max rows to enrich per table this run (bounds proxy bandwidth; default 2000)"
        required: false
        default: "2000"

concurrency:
  group: wasalt-enrich
  cancel-in-progress: false

jobs:
  enrich:
    name: Enrich ${{ matrix.table }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        table:
          - wasalt_residential_listings
          - wasalt_commercial_listings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Enrich ${{ matrix.table }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
          SCRAPE_MIN_INTERVAL: "0.3"
        run: |
          python -m scrapers.wasalt.enrich \
            --table ${{ matrix.table }} \
            --limit ${{ github.event.inputs.limit || 2000 }} \
            --workers 6
