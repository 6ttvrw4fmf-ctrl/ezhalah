# Wasalt RESIDENTIAL fill — scrapes wasalt.sa into wasalt_residential_listings.
#
# Wasalt is a Next.js app: each search page embeds 32 fully-structured listings in __NEXT_DATA__,
# so one fetch = 32 listings (no per-listing enrich). We sweep the NATIONAL search per
# (type-slug × sale/rent) — each listing carries its own city — and paginate deep. One GitHub
# machine per (slug × deal) shard, all in parallel.
#
# HOW TO RUN: Actions tab → "Wasalt fill" → Run workflow (set pages, default 800).

name: Wasalt fill

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Max pages per (type × deal) slice (32 listings/page; default 800)"
        required: false
        default: "800"

jobs:
  fill:
    name: Wasalt ${{ matrix.slug }} ${{ matrix.deal }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        slug: [apartment, villa-townhouse, floor, building, land, rest-house, chalet, farm, room, duplex]
        deal: [sale, rent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Wasalt fill ${{ matrix.slug }} ${{ matrix.deal }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MIN_INTERVAL: "0.25"
        run: |
          python -m scrapers.wasalt.run \
            --type residential \
            --slug ${{ matrix.slug }} \
            --deal ${{ matrix.deal }} \
            --pages ${{ github.event.inputs.pages || 800 }}
