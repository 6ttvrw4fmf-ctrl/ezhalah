# Aldarim sync — Aldarim Real Estate is small (~157 available, one public API), so a single daily
# full-refresh is enough: re-scrape every available listing AND auto-prune any that became
# sold/rented/removed (self-cleaning, no separate liveness/cleanup needed). The API is a public AWS
# endpoint (aldarim.nzl-backend.com) — no proxy, unlike Wasalt.

name: Aldarim sync

on:
  schedule:
    - cron: "15 4 * * *"   # daily 04:15 UTC
  workflow_dispatch: {}

concurrency:
  group: aldarim-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Sync Aldarim
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MIN_INTERVAL: "0.3"
        run: python -m scrapers.aldarim.run --pages 50
