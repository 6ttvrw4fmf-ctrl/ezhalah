# Wasalt LIGHTWEIGHT liveness — a daily, bandwidth-cheap existence check for every active
# wasalt_*_listings row, filling the gap left by wasalt-liveness.yml (which never runs
# automatically — see that file's comment about the ~700GB/month full-page-fetch cost).
#
# This uses --check-mode head (scrapers/aqar/liveness.py): a bare HEAD request per listing,
# body never downloaded. A few hundred bytes per row instead of ~400KB — roughly three orders
# of magnitude cheaper — so a DAILY sweep over the whole Wasalt catalog through the metered
# Saudi proxy is affordable. Same 3-strike grace (missing_count>=3 before active=false) and
# the same "leave untouched on any ambiguous signal" philosophy as Aqar's full-mode liveness.
#
# Known limitation (owner 2026-07-06): this can only see HTTP status codes, not page content —
# it CANNOT detect a "soft 404" (a listing page that returns 200 but renders a client-side
# "not found" state). That failure mode can only ever make this UNDER-detect dead listings
# (safe direction — never wrongly kills a live one). If Wasalt's real removed-listing behavior
# turns out to need a body check too, use the existing wasalt-liveness.yml (--check-mode full,
# manual-only, run occasionally) as the deeper, ground-truth verification pass.

name: Wasalt liveness (lightweight)

on:
  # Scheduled via pg_cron -> trigger_gh_workflow('wasalt-liveness-light.yml'), same as every other
  # scraper workflow in this repo (NOT a native GitHub `schedule:` trigger — all cadence is owned by
  # Postgres/pg_cron so it can be monitored/paused from the DB side like everything else).
  workflow_dispatch: {}

concurrency:
  group: wasalt-liveness-light
  cancel-in-progress: false

jobs:
  liveness:
    name: Liveness (light) ${{ matrix.table }} #${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        table:
          - wasalt_residential_listings
          - wasalt_commercial_listings
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Lightweight liveness sweep ${{ matrix.table }} shard ${{ matrix.shard }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WASALT_PROXY_URL: ${{ secrets.WASALT_PROXY_URL }}
        run: |
          python -m scrapers.aqar.liveness \
            --table ${{ matrix.table }} \
            --check-mode head \
            --shards 8 --shard ${{ matrix.shard }}
