# Hajer Houses sync — hajerhouses.com is a small Saudi WordPress + REM site (~126 listings, public
# WP REST for the list, detail-page parse for the REM specs). No auth, no proxy. A single full-refresh
# every 4h re-scrapes everything, skips sold/rented (الحالة), and auto-prunes anything that dropped off.

name: Hajer Houses sync

on:
  schedule:
    - cron: "5 */4 * * *"   # every 4 hours (offset from the other sources)
  workflow_dispatch: {}

concurrency:
  group: hajer-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Sync Hajer Houses
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MIN_INTERVAL: "0.3"
        run: python -m scrapers.hajer.run --type all
